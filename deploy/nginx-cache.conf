# Cache headers + SPA fallback (include in nginx server block for skinvestments.app)
#
# If TLS terminates here, force HTTPS before serving files:
#   if ($scheme != "https") { return 301 https://$host$request_uri; }
#
# SPA + prerendered routes (/blog/index.html, etc.):
#   location / {
#     try_files $uri $uri/ $uri/index.html /index.html;
#   }
#
# Example:
#   root /home/ubuntu/serwer/strona/dist;
#   include /home/ubuntu/serwer/strona/deploy/nginx-cache.conf;

# SPA — always revalidate HTML
location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri =404;
}

# Vite hashed bundles (JS/CSS) — safe to cache 1 year
location /assets/ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

# Images, fonts, icons, SVG
location ~* \.(?:woff2|woff|ttf|otf|svg|webp|png|jpg|jpeg|gif|ico)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

# noise.svg, robots.txt at root
location = /noise.svg {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

location = /robots.txt {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
}
