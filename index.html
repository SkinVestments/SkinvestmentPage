    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            colors: {
              steam: {
                bg: 'var(--color-background)',
                surface: 'var(--color-surface)',
                elevated: 'var(--color-surface-elevated)',
                card: 'var(--color-surface-overlay)',
                hover: 'var(--color-surface-hover)',
                border: 'var(--color-card-border)',
                light: 'var(--color-surface)',
                accent: 'var(--color-accent)',
                'accent-dark': 'var(--color-accent-variant)',
                text: 'var(--color-text-primary)',
                secondary: 'var(--color-text-secondary)',
                tertiary: 'var(--color-text-tertiary)',
                profit: 'var(--color-profit)',
                loss: 'var(--color-loss)',
                success: 'var(--color-success)',
                warning: 'var(--color-warning)',
                gold: '#FFC107',
              }
            },
            animation: {
              'glow': 'glow 3s ease-in-out infinite alternate',
              'float': 'float 6s ease-in-out infinite',
              'float-delayed': 'float 6s ease-in-out 3s infinite',
              'scroll': 'scroll 30s linear infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            backgroundImage: {
              'noise': "url('https://grainy-gradients.vercel.app/noise.svg')",
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px color-mix(in srgb, var(--color-accent) 20%, transparent)' },
                '100%': { boxShadow: '0 0 25px color-mix(in srgb, var(--color-accent) 40%, transparent), 0 0 10px color-mix(in srgb, var(--color-accent) 55%, transparent)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              scroll: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-100%)' },
              }
            }
          }
        }
      }
    </script>
